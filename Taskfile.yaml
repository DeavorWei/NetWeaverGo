version: "3"

includes:
  common: build/Taskfile.yml
  windows: build/windows/Taskfile.yml

vars:
  # 对应旧的 "name"
  APP_NAME: "NetWeaverGo"

  # 对应旧的 "build": {"dir": "cmd/netweaver"}
  MAIN_DIR: "cmd/netweaver"

  # 对应旧的 "frontend": {"dir": "frontend"}
  FRONTEND_DIR: "frontend"

  # 对应旧的 "outputdir": "frontend/src/bindings"
  BINDINGS_DIR: "frontend/src/bindings"

  # 输出目录
  BIN_DIR: "dist"

tasks:
  # 执行 wails3 build 时会调用这个任务
  build:
    desc: "Build the application"
    cmds:
      - task: build-frontend
      - task: generate-bindings
      - wails3 generate build-assets
      # 注意：在最后加上 ./{{.MAIN_DIR}} 来告诉 Go 编译哪个目录
      - go build -tags netgo -ldflags "-s -w" -o {{.BIN_DIR}}/{{.APP_NAME}} ./{{.MAIN_DIR}}

  # 执行 wails3 dev 时会调用这个任务
  dev:
    desc: "Run the application in development mode"
    cmds:
      - task: generate-bindings
      # -d 指定了 main.go 所在的目录，以便 wails 监听和运行
      # -port 指定前端开发服务器端口
      - wails3 dev -d ./{{.MAIN_DIR}} -port 5173

  # 前端编译逻辑
  build-frontend:
    desc: "Build the frontend"
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install
      # 对应旧的 "build": "npm run build"
      - npm run build

  # 生成 TypeScript 绑定文件
  generate-bindings:
    desc: "Generate TS bindings"
    cmds:
      # -d 指定输出目录
      # -ts 对应旧的 "outputtype": "typescript"
      # 最后跟上要扫描的包名/目录
      - wails3 generate bindings -d {{.BINDINGS_DIR}} -ts ./{{.MAIN_DIR}}

  # 运行已构建的应用程序 (跨平台)
  run:
    desc: "Run the built application"
    cmds:
      - task: "{{OS}}:run"
