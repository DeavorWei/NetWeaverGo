# NetWeaverGo 全局运行参数配置

settings:
  # 最大并发协程数量
  max_workers: 32
  
  # SSH/SFTP 连接阶段总体超时时间
  connect_timeout: "10s"
  
  # 单条命令执行的默认超时时间
  command_timeout: "30s"
  
  # 回显输出与配置备份的存放根目录
  output_dir: "output"
  
  # 系统运行日志存放目录
  log_dir: "logs"
  
  # 发生错误时的默认防线动作: 
  # pause (挂起询问), skip (仅提示并跳过后续同异常动作), abort (终止该设备的执行并退出)
  error_mode: "pause"
