version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml

vars:
  APP_NAME: "netweavergo"
  BIN_DIR: "build/bin"
  MAIN_DIR: "cmd/netweaver"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  dev:debug:
    summary: Runs the application with debugger support (Delve)
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}} -debug

  dev:clean:
    summary: Cleans development artifacts
    cmds:
      - powershell Remove-Item -Recurse -Force build/bin -ErrorAction SilentlyContinue
      - powershell Remove-Item -Recurse -Force frontend/dist -ErrorAction SilentlyContinue

  dev:reset:
    summary: Full reset of development environment
    deps: [dev:clean]
    cmds:
      - powershell Remove-Item -Recurse -Force frontend/node_modules -ErrorAction SilentlyContinue
      - task: common:install:frontend:deps

  dev:logs:
    summary: View development logs in real-time
    cmds:
      - powershell Get-Content -Path "build/bin/netWeaverGoData/logs/app.log" -Wait -ErrorAction SilentlyContinue

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker
